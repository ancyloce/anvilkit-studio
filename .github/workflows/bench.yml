name: Bench

# phase4-015 — performance regression gate.
# Runs `pnpm bench` on every PR, comparing results against
# `bench/baseline.json` (committed). Fails the job on >20%
# regression in `meanMs` or >10% regression in `bytes`. Sub-
# millisecond benches are tracked but not gated (noise floor);
# see `bench/index.ts`.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  bench:
    name: Performance regression gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Bench harness imports from @anvilkit/plugin-export-html/dist,
      # @anvilkit/ir/dist, @anvilkit/plugin-version-history/dist, and
      # every @anvilkit/<component>/dist — so all of them must be
      # built before the bench runs. phase5-019 phase4-015 added the
      # per-component React render bench (component-render:*) that
      # pulls from each component package.
      - name: Build packages consumed by benches
        run: |
          pnpm --filter @anvilkit/utils \
               --filter @anvilkit/ir \
               --filter @anvilkit/schema \
               --filter @anvilkit/core \
               --filter @anvilkit/ui \
               --filter @anvilkit/plugin-export-html \
               --filter @anvilkit/plugin-version-history \
               --filter '@anvilkit/bento-grid' \
               --filter '@anvilkit/blog-list' \
               --filter '@anvilkit/button' \
               --filter '@anvilkit/helps' \
               --filter '@anvilkit/hero' \
               --filter '@anvilkit/input' \
               --filter '@anvilkit/logo-clouds' \
               --filter '@anvilkit/navbar' \
               --filter '@anvilkit/pricing-minimal' \
               --filter '@anvilkit/section' \
               --filter '@anvilkit/statistics' \
               build

      # phase5-019 phase4-015 — the Playwright editor-load bench
      # measures `/puck/editor` TTI against a real `next start`. Build
      # the demo + launch it in the background, wait for readiness,
      # then hand off to the bench. `editor-load.bench.ts` also
      # self-skips if the URL is not reachable (local-dev fallback),
      # so this step is the one that turns the bench from "skipped"
      # to "measured" in CI.
      - name: Build demo for editor-load bench
        run: pnpm --filter demo build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Start demo in background
        run: |
          pnpm --filter demo exec next start -p 3000 &
          echo "demo_pid=$!" >> "$GITHUB_ENV"
          # Wait up to 60s for the server to become reachable.
          for i in $(seq 1 60); do
            if curl -sf -o /dev/null http://localhost:3000/puck/editor; then
              echo "demo reachable after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::warning::demo not reachable after 60s — editor-load bench will skip"

      - name: Run benches
        id: bench
        env:
          BENCH_SUMMARY_PATH: bench-summary.md
          ANVILKIT_EDITOR_URL: http://localhost:3000/puck/editor
        run: pnpm bench

      - name: Stop demo
        if: always() && env.demo_pid
        run: kill "${demo_pid}" 2>/dev/null || true

      - name: Upload bench summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-summary
          path: bench-summary.md
          retention-days: 14

      # Post the summary table as a PR comment so regressions show up
      # inline next to the diff.
      - name: Comment bench results on PR
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: phase4-015-bench
          path: bench-summary.md
