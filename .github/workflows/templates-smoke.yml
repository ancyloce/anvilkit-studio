name: Templates smoke

# phase5-017 — weekly smoke test for the 10 first-party
# `@anvilkit/template-*` packages.
#
# Copies each template into a `mktemp` directory, runs
# `pnpm install && pnpm build`, then verifies the built default
# export satisfies `isAnvilkitTemplate()`. Fails and pings the
# maintainer on regression.
#
# Intentionally NOT gated on every PR — per-PR safety for template
# builds is covered by the workspace `pnpm build`. This cron catches
# rot from upstream breakages (Node, tsc, @anvilkit/core) that only
# manifest when a template is pulled out of the workspace.

on:
  schedule:
    # Tuesdays 07:17 UTC — staggered off generator-smoke.
    - cron: "17 7 * * 2"
  workflow_dispatch:

jobs:
  smoke:
    name: Install, build, and verify each first-party template
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        template:
          - landing-saas
          - landing-agency
          - landing-docs
          - pricing-comparison
          - blog-index
          - blog-article
          - feature-overview
          - contact
          - about
          - changelog

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      # Template packages are pure TS + JSON — the cheapest thing
      # the smoke test can do is pull one out of the workspace,
      # drop it in a mktemp dir, and rebuild it against its
      # declared peer + dev deps. If the workspace's version of
      # `@anvilkit/core` resolves but a published version would
      # not, this will catch it.
      - name: Stage ${{ matrix.template }} into a tmp dir
        id: stage
        run: |
          WORKDIR="$(mktemp -d)"
          echo "workdir=$WORKDIR" >> "$GITHUB_OUTPUT"
          cp -R "packages/templates/${{ matrix.template }}"/. "$WORKDIR"/

      - name: Install standalone
        working-directory: ${{ steps.stage.outputs.workdir }}
        run: pnpm install --ignore-workspace --no-frozen-lockfile

      - name: Build standalone
        working-directory: ${{ steps.stage.outputs.workdir }}
        run: pnpm build

      - name: Verify default export against isAnvilkitTemplate()
        working-directory: ${{ steps.stage.outputs.workdir }}
        run: |
          node -e "
            import('./dist/index.js').then(async (mod) => {
              const core = await import('@anvilkit/core/templates');
              if (!core.isAnvilkitTemplate(mod.default)) {
                console.error('default export failed isAnvilkitTemplate()');
                process.exit(1);
              }
              if (mod.default.slug !== '${{ matrix.template }}') {
                console.error('slug mismatch');
                process.exit(1);
              }
              console.log('ok ${{ matrix.template }}');
            });
          "

      - name: Publint
        working-directory: ${{ steps.stage.outputs.workdir }}
        run: pnpm dlx publint@latest

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `templates-smoke: ${{ matrix.template }} regression`;
            const body = `templates-smoke failed for ${{ matrix.template }} on ${new Date().toISOString()}. ` +
              `See run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "templates-smoke",
            });
            const sameTemplate = existing.find((i) => i.title === title);
            if (sameTemplate) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: sameTemplate.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["templates-smoke", "bug"],
              });
            }
