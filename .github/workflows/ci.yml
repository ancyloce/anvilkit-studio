name: CI

# Phase 5 (restructure plan §16/§19): the former single monolithic job is
# split so npm release gates and app/deploy gates are separate, path-aware
# checks:
#
#   changes        — classifies the PR diff (dorny/paths-filter).
#   validate       — lint + typecheck + madge + test + build for the whole
#                    workspace. Always runs: this is the full blocking gate
#                    the migration plan keeps in place during the
#                    restructure.
#   package-gates  — publint + per-package `check:all` release gates + size
#                    budgets. npm release concerns; skipped only when every
#                    changed file lives under `apps/`. Apps are
#                    dependency-graph leaves — no package depends on an app,
#                    so an app-only diff cannot affect a package gate.
#   studio-e2e /   — per-app Playwright suites (+ the docs build). Each runs
#   playground-e2e   when the app itself changed or when anything outside
#   / docs           `apps/` changed — a package change can affect every
#                    app, so the conservative full cone applies.
#
# Skipping is deliberately coarse: finer per-package cones stay off until
# dependency boundaries are machine-enforced (plan §15/§19 —
# dependency-cruiser is still deferred). Jobs are skipped via job-level
# `if:` rather than `on.paths` so branch-protection required checks report
# "skipped" (which satisfies protection) instead of hanging as "expected".

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Classify changed paths
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      non_app: ${{ steps.filter.outputs.non_app }}
      studio: ${{ steps.filter.outputs.studio }}
      playground: ${{ steps.filter.outputs.playground }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      # pull_request events are classified via the GitHub API — no checkout
      # needed. On workflow_dispatch this step is skipped and every output
      # is empty, which the job conditions below treat as "run everything".
      - name: Detect changed paths
        id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            # Any changed file OUTSIDE apps/ ⇒ run the full dependent cone.
            # Belt-and-braces patterns: `!(apps)/**` catches every current
            # and future top-level directory except apps/, and the
            # root-file/dotfile patterns catch lockfile, workspace, and
            # config changes. A future new top-level directory therefore
            # fails safe (runs everything) instead of skipping gates.
            non_app:
              - "!(apps)/**"
              - "*"
              - ".*"
              - ".*/**"
            studio:
              - "apps/studio/**"
            playground:
              - "apps/playground/**"
            docs:
              - "apps/docs/**"

  validate:
    name: Lint, Typecheck, and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up workspace
        uses: ./.github/actions/setup-workspace

      - name: Lint workspace
        run: pnpm lint

      - name: Typecheck workspace
        run: pnpm typecheck

      - name: Madge — detect circular dependencies
        run: pnpm madge

      - name: Test workspace
        run: pnpm test

      - name: Build workspace
        run: pnpm build

  package-gates:
    name: Package release gates
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.event_name != 'pull_request' || needs.changes.outputs.non_app == 'true'
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up workspace
        uses: ./.github/actions/setup-workspace

      # Retained-submodule contract (plan §16 Phase 5, §19): gitlink
      # pointer bumps land as `packages/**` changes, so they route into
      # this job — validate the pinned submodule state against
      # scripts/submodule-contract.json before running its gates.
      - name: Validate retained-submodule contracts
        run: node scripts/check-submodule-contracts.mjs

      # `check:all` and the size budgets inspect `dist/`, so build first.
      - name: Build workspace
        run: pnpm build

      - name: Publint — validate package.json exports
        run: pnpm publint

      # Phase 5: release gates are discovered from workspace manifests, not
      # a hardcoded package list (plan §20). The root `check:all` script
      # fans out via `turbo run check:all --concurrency=4` to every
      # workspace package that defines a `check:all` script (20 packages at
      # time of writing) — publint, circular-dep scan, React-free-runtime
      # assertions, peer-dep contracts, bundle budgets, and TypeDoc API
      # snapshots, per package. A newly added publishable package is gated
      # automatically the moment it ships a `check:all` script. Concurrency
      # stays at 4 — higher fan-out is a known source of phantom
      # bundle-budget failures.
      - name: Run package release gates (check:all)
        run: pnpm check:all

      # Phase 4 (`phase4-016`): per-package gzip budgets via size-limit.
      # Covers the publishable runtime + plugin + component packages.
      # I2-6 added the canvas packages (canvas-core, canvas-editor,
      # plugin-ai-image, plugin-canvas-studio); I2-3 added plugin-export-canvas.
      # Each package ships its own `.size-limit.json` with a tuned budget.
      # Every component `.size-limit.json` carries TWO entries — the JS
      # `dist/index.js` budget and a `dist/styles.css` gzip budget (12 KB) —
      # so this one step gates both. The CSS budget guards against a component
      # re-importing `@anvilkit/tailwind-config/shadcn` (the app-level sheet),
      # which would re-emit preflight + the workspace utility superset (~24 KB)
      # into the package; `/component` is the per-component, preflight-free entry.
      # The filter list stays explicit (rather than `turbo run size`
      # discovery) so budget coverage changes remain deliberate, reviewed
      # decisions.
      - name: Bundle-size budgets (size-limit)
        run: |
          pnpm \
            --filter @anvilkit/utils \
            --filter @anvilkit/contracts \
            --filter @anvilkit/ir \
            --filter @anvilkit/schema \
            --filter @anvilkit/validator \
            --filter @anvilkit/ui \
            --filter @anvilkit/core \
            --filter @anvilkit/plugin-export-html \
            --filter @anvilkit/plugin-export-react \
            --filter @anvilkit/plugin-ai-copilot \
            --filter @anvilkit/plugin-asset-manager \
            --filter @anvilkit/plugin-design-system \
            --filter @anvilkit/plugin-page-seo \
            --filter @anvilkit/analytics-core \
            --filter @anvilkit/analytics-react \
            --filter @anvilkit/canvas-core \
            --filter @anvilkit/canvas-editor \
            --filter @anvilkit/plugin-ai-image \
            --filter @anvilkit/plugin-canvas-studio \
            --filter @anvilkit/plugin-export-canvas \
            --filter @anvilkit/bento-grid \
            --filter @anvilkit/blog-list \
            --filter @anvilkit/button \
            --filter @anvilkit/design-block \
            --filter @anvilkit/helps \
            --filter @anvilkit/hero \
            --filter @anvilkit/input \
            --filter @anvilkit/logo-clouds \
            --filter @anvilkit/navbar \
            --filter @anvilkit/pricing-minimal \
            --filter @anvilkit/section \
            --filter @anvilkit/statistics \
            size

  # Phase 3 M0 (`phase3-001`): Playwright + studio E2E harness. The smoke
  # spec loads `/puck/editor`, waits for `<Studio>` to hydrate, and asserts
  # `smokeTestPlugin.onInit` logs to the browser console. The studio
  # Playwright config boots its own `pnpm dev` server; `turbo run e2e`
  # builds the studio's workspace dependencies first (`e2e` dependsOn
  # `^build`).
  studio-e2e:
    name: Studio E2E
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.event_name != 'pull_request' || needs.changes.outputs.non_app == 'true' || needs.changes.outputs.studio == 'true'
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up workspace
        uses: ./.github/actions/setup-workspace

      # `install --with-deps chromium` downloads Chromium + the OS
      # libraries Playwright needs on Ubuntu runners. Locally, developers
      # run `pnpm --filter studio e2e:install` once.
      - name: Install Playwright browsers
        run: pnpm --filter studio e2e:install

      - name: Run studio E2E tests
        run: pnpm exec turbo run e2e --filter=studio

      - name: Upload studio Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-studio
          path: apps/studio/playwright-report/
          retention-days: 7

  # Phase 1 restructure: playground compatibility smoke. Minimal app
  # (apps/playground) that consumes @anvilkit/* strictly through built
  # public exports — mounts <Studio>, SSR-renders via @puckeditor/core/rsc.
  # Boots its own Next dev server on :3100 (studio owns :3000).
  playground-e2e:
    name: Playground E2E
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.event_name != 'pull_request' || needs.changes.outputs.non_app == 'true' || needs.changes.outputs.playground == 'true'
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up workspace
        uses: ./.github/actions/setup-workspace

      - name: Install Playwright browsers
        run: pnpm --filter playground e2e:install

      - name: Run playground E2E tests
        run: pnpm exec turbo run e2e --filter=playground

      - name: Upload playground Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-playground
          path: apps/playground/playwright-report/
          retention-days: 7

  # Phase 4 (`phase4-001`): build the Fumadocs docs site (Vite / TanStack
  # Start) on every packages or docs PR. A broken docs build fails CI so
  # drifted component docs, sidebar entries, and ADR references can't land
  # unnoticed.
  #
  # Phase 4 (`phase4-005`): the build step is a **correctness** gate. The
  # **deploy** gate lives on Vercel (`vercel.json` at repo root) and posts
  # its own GitHub check with the preview URL. The Vercel check is
  # informational from CI's perspective — a failing Vercel build surfaces
  # in the PR UI but does not fail this workflow, and conversely a failing
  # CI build does not suppress the Vercel preview. The two builds are
  # intentionally independent so a regression in either surfaces before
  # merge.
  #
  # Phase 4 (`phase4-004`): docs site playground + marketplace smoke tests.
  # The specs boot the Vite dev server (TanStack Start), mount the Puck
  # `/playground`, and exercise the marketplace catalog.
  docs:
    name: Docs build + E2E
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.event_name != 'pull_request' || needs.changes.outputs.non_app == 'true' || needs.changes.outputs.docs == 'true'
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up workspace
        uses: ./.github/actions/setup-workspace

      - name: Build docs site
        run: pnpm turbo run docs:build

      - name: Install Playwright browsers
        run: pnpm --filter @anvilkit/docs-site e2e:install

      - name: Run docs E2E tests
        run: pnpm exec turbo run e2e --filter=@anvilkit/docs-site

      - name: Upload docs Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-docs
          path: apps/docs/playwright-report/
          retention-days: 7
