name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Lint, Typecheck, and Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint workspace
        run: pnpm lint

      - name: Typecheck workspace
        run: pnpm typecheck

      - name: Test workspace
        run: pnpm test

      - name: Build workspace
        run: pnpm build

      # `check:all` aggregates the `@anvilkit/core` release gates from
      # `core-015`: publint, circular-dep scan (madge), the
      # React-free-runtime assertion, the peer-dep contract, the
      # `<Studio>` entry bundle budget (25 KB gzipped + adapter
      # tree-shake check), and the TypeDoc API snapshot. Runs after
      # `build` because the bundle-budget script inspects `dist/` and
      # the API-snapshot generator emits into `packages/core/api/`.
      - name: Run @anvilkit/core release gates
        run: pnpm --filter @anvilkit/core check:all
