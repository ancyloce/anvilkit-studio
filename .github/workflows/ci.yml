name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Lint, Typecheck, and Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.5.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `packages/components` is a nested pnpm workspace (its own
      # pnpm-workspace.yaml), so the root install doesn't populate
      # its `node_modules`. Without this step, turbo's `pnpm run
      # build` inside a component leaf triggers pnpm 11's
      # verify-deps-before-run auto-install, which is both slow and
      # subject to strict-dep-builds errors on first run.
      - name: Install components workspace
        # `--config.strictDepBuilds=false` overrides the pnpm 11
        # default that turns ignored install scripts (esbuild, msw)
        # into an `[ERR_PNPM_IGNORED_BUILDS]` failure. The components
        # workspace has no build approvals of its own, so the install
        # would otherwise abort even though the ignored scripts are
        # safe to skip.
        run: pnpm --dir packages/components install --frozen-lockfile --config.strictDepBuilds=false

      - name: Lint workspace
        run: pnpm lint

      - name: Typecheck workspace
        run: pnpm typecheck

      - name: Madge — detect circular dependencies
        run: pnpm madge

      - name: Test workspace
        run: pnpm test

      - name: Build workspace
        run: pnpm build

      # Phase 4 (`phase4-001`): build the Fumadocs docs site (Vite /
      # TanStack Start) on every PR. A broken docs build fails CI so
      # drifted component docs, sidebar entries, and ADR references
      # can't land unnoticed.
      #
      # Phase 4 (`phase4-005`): this step is a **correctness** gate.
      # The **deploy** gate lives on Vercel (`vercel.json` at repo
      # root) and posts its own GitHub check with the preview URL.
      # The Vercel check is informational from CI's perspective — a
      # failing Vercel build surfaces in the PR UI but does not fail
      # this workflow, and conversely a failing CI build does not
      # suppress the Vercel preview. The two builds are intentionally
      # independent so a regression in either surfaces before merge.
      - name: Build docs site
        run: pnpm turbo run docs:build

      - name: Publint — validate package.json exports
        run: pnpm publint

      # `check:all` aggregates the `@anvilkit/core` release gates from
      # `core-015`: publint, circular-dep scan (madge), the
      # React-free-runtime assertion, the peer-dep contract, the
      # `<Studio>` entry bundle budget (25 KB gzipped + adapter
      # tree-shake check), and the TypeDoc API snapshot. Runs after
      # `build` because the bundle-budget script inspects `dist/` and
      # the API-snapshot generator emits into `packages/core/api/`.
      - name: Run @anvilkit/core release gates
        run: pnpm --filter @anvilkit/core check:all

      # Phase 3 (`phase3-015`): run the same quality gates against each
      # new package — `publint`, `madge --circular`,
      # `check:react-free-runtime` (ir / schema / validator only;
      # plugin `check:all` already omits that step),
      # `check:peer-deps`, `check:bundle-budget`, and the TypeDoc API
      # snapshot. Loop form matches the task brief and avoids
      # duplicating five near-identical step entries.
      - name: Run Phase 3 package release gates
        run: |
          for pkg in @anvilkit/ir @anvilkit/schema @anvilkit/validator @anvilkit/plugin-export-html @anvilkit/plugin-export-react @anvilkit/plugin-ai-copilot @anvilkit/plugin-asset-manager @anvilkit/plugin-design-system @anvilkit/plugin-page-seo @anvilkit/analytics-core @anvilkit/analytics-react; do
            pnpm --filter "$pkg" check:all
          done

      # Phase 4 (`phase4-016`): per-package gzip budgets via size-limit.
      # Covers the publishable runtime + plugin + component packages.
      # I2-6 added the canvas packages (canvas-core, canvas-editor,
      # plugin-ai-image, plugin-canvas-studio); I2-3 added plugin-export-canvas.
      # Each package ships its own `.size-limit.json` with a tuned budget.
      # Every component `.size-limit.json` now carries TWO entries — the JS
      # `dist/index.js` budget and a `dist/styles.css` gzip budget (12 KB) —
      # so this one step gates both. The CSS budget guards against a component
      # re-importing `@anvilkit/tailwind-config/shadcn` (the app-level sheet),
      # which would re-emit preflight + the workspace utility superset (~24 KB)
      # into the package; `/component` is the per-component, preflight-free entry.
      # design-block was previously absent from this list (and shipped no
      # `.size-limit.json`); it now has a config and is enforced here too.
      - name: Bundle-size budgets (size-limit)
        run: |
          pnpm \
            --filter @anvilkit/utils \
            --filter @anvilkit/ir \
            --filter @anvilkit/schema \
            --filter @anvilkit/validator \
            --filter @anvilkit/ui \
            --filter @anvilkit/core \
            --filter @anvilkit/plugin-export-html \
            --filter @anvilkit/plugin-export-react \
            --filter @anvilkit/plugin-ai-copilot \
            --filter @anvilkit/plugin-asset-manager \
            --filter @anvilkit/plugin-design-system \
            --filter @anvilkit/plugin-page-seo \
            --filter @anvilkit/analytics-core \
            --filter @anvilkit/analytics-react \
            --filter @anvilkit/canvas-core \
            --filter @anvilkit/canvas-editor \
            --filter @anvilkit/plugin-ai-image \
            --filter @anvilkit/plugin-canvas-studio \
            --filter @anvilkit/plugin-export-canvas \
            --filter @anvilkit/bento-grid \
            --filter @anvilkit/blog-list \
            --filter @anvilkit/button \
            --filter @anvilkit/design-block \
            --filter @anvilkit/helps \
            --filter @anvilkit/hero \
            --filter @anvilkit/input \
            --filter @anvilkit/logo-clouds \
            --filter @anvilkit/navbar \
            --filter @anvilkit/pricing-minimal \
            --filter @anvilkit/section \
            --filter @anvilkit/statistics \
            size

      # Phase 3 M0 (`phase3-001`): Playwright + demo E2E harness. The
      # smoke spec loads `/puck/editor`, waits for `<Studio>` to
      # hydrate, and asserts `smokeTestPlugin.onInit` logs to the
      # browser console. Future Phase 3 tasks (`phase3-014`) add
      # real export + AI copilot E2Es under the same harness.
      #
      # `install --with-deps chromium` downloads Chromium + the OS
      # libraries Playwright needs on Ubuntu runners. Locally,
      # developers run `pnpm --filter demo e2e:install` once.
      - name: Install Playwright browsers
        run: pnpm --filter demo exec playwright install --with-deps chromium

      - name: Run demo E2E tests
        run: pnpm --filter demo e2e

      - name: Upload demo Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-demo
          path: apps/demo/playwright-report/
          retention-days: 7

      # Phase 4 (`phase4-004`): docs site playground + marketplace
      # smoke tests. The specs boot the Vite dev server (TanStack
      # Start), mount the Puck `/playground`, and exercise the
      # marketplace catalog. The demo step above already installed
      # the Chromium browser binary — we just need the
      # `@anvilkit/docs-site` Playwright config to pick it up.
      - name: Install Playwright browsers (docs)
        run: pnpm --filter @anvilkit/docs-site exec playwright install --with-deps chromium

      - name: Run docs E2E tests
        run: pnpm --filter @anvilkit/docs-site e2e

      - name: Upload docs Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-docs
          path: apps/docs/playwright-report/
          retention-days: 7
