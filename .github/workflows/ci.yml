name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Lint, Typecheck, and Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint workspace
        run: pnpm lint

      - name: Typecheck workspace
        run: pnpm typecheck

      - name: Madge — detect circular dependencies
        run: pnpm madge

      - name: Test workspace
        run: pnpm test

      - name: Build workspace
        run: pnpm build

      # Phase 4 (`phase4-001`): build the Starlight docs site on every
      # PR. A broken docs build fails CI so drifted component docs,
      # sidebar entries, and ADR references can't land unnoticed.
      - name: Build docs site
        run: pnpm turbo run docs:build

      - name: Publint — validate package.json exports
        run: pnpm publint

      # `check:all` aggregates the `@anvilkit/core` release gates from
      # `core-015`: publint, circular-dep scan (madge), the
      # React-free-runtime assertion, the peer-dep contract, the
      # `<Studio>` entry bundle budget (25 KB gzipped + adapter
      # tree-shake check), and the TypeDoc API snapshot. Runs after
      # `build` because the bundle-budget script inspects `dist/` and
      # the API-snapshot generator emits into `packages/core/api/`.
      - name: Run @anvilkit/core release gates
        run: pnpm --filter @anvilkit/core check:all

      # Phase 3 (`phase3-015`): run the same quality gates against each
      # new package — `publint`, `madge --circular`,
      # `check:react-free-runtime` (ir / schema / validator only;
      # plugin `check:all` already omits that step),
      # `check:peer-deps`, `check:bundle-budget`, and the TypeDoc API
      # snapshot. Loop form matches the task brief and avoids
      # duplicating five near-identical step entries.
      - name: Run Phase 3 package release gates
        run: |
          for pkg in @anvilkit/ir @anvilkit/schema @anvilkit/validator @anvilkit/plugin-export-html @anvilkit/plugin-ai-copilot; do
            pnpm --filter "$pkg" check:all
          done

      # Phase 3 M0 (`phase3-001`): Playwright + demo E2E harness. The
      # smoke spec loads `/puck/editor`, waits for `<Studio>` to
      # hydrate, and asserts `smokeTestPlugin.onInit` logs to the
      # browser console. Future Phase 3 tasks (`phase3-014`) add
      # real export + AI copilot E2Es under the same harness.
      #
      # `install --with-deps chromium` downloads Chromium + the OS
      # libraries Playwright needs on Ubuntu runners. Locally,
      # developers run `pnpm --filter demo e2e:install` once.
      - name: Install Playwright browsers
        run: pnpm --filter demo exec playwright install --with-deps chromium

      - name: Run demo E2E tests
        run: pnpm --filter demo e2e

      - name: Upload demo Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-demo
          path: apps/demo/playwright-report/
          retention-days: 7

      # Phase 4 (`phase4-004`): docs site playground smoke test. The
      # spec boots the Starlight preview server, asserts all 11
      # component palette entries, drives the HTML export button,
      # and verifies the localStorage round-trip. The demo step
      # above already installed the Chromium browser binary — we
      # just need the `@anvilkit/docs-site` Playwright config to
      # pick it up.
      - name: Install Playwright browsers (docs)
        run: pnpm --filter @anvilkit/docs-site exec playwright install --with-deps chromium

      - name: Run docs E2E tests
        run: pnpm --filter @anvilkit/docs-site e2e

      - name: Upload docs Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-docs
          path: apps/docs/playwright-report/
          retention-days: 7
