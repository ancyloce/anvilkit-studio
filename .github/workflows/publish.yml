name: Publish

# phase4-017 + phase5-019 — publish package.json versions on merge
# to main, with explicit ceremony hooks for the
# beta → 1.0 → GA transitions.
#
# Normal flow (push to main): the workflow compares each public
# workspace package's package.json version with npm. It publishes only
# existing package names whose exact local version is absent from npm,
# under the current dist-tag (`beta` during pre-release, `latest`
# after exit). The workflow never auto-bumps versions.
#
# Ceremony flow (workflow_dispatch): the maintainer picks a `mode`:
#   - `auto`          — default, same as the push-triggered flow.
#   - `enter-beta`    — one-shot: `pnpm changeset pre enter beta`
#                        + commit + push. Flips the repo into
#                        pre-release state before the first beta cut.
#                        No-op if already in pre state.
#   - `exit-beta`     — one-shot: `pnpm changeset pre exit` + commit
#                        + push. Flips back to `latest` dist-tag for
#                        the `v1.0.0` GA cut. No-op if not in pre.
#   - `publish-only`  — skips the auto-ceremony detection and just
#                        runs the changesets publish step. Useful
#                        when a prior `enter-beta`/`exit-beta` job
#                        already landed its commit.
#
# NPM_TOKEN must be a granular, automation-scoped token scoped to
# the @anvilkit/* packages. Publish steps expose it as both NPM_TOKEN
# (for changeset publish) and NODE_AUTH_TOKEN (for setup-node's npmrc).
# The release job also writes an explicit temp npmrc so every nested
# npm/pnpm process uses the same token-backed registry configuration.
# Rotate on any suspected compromise — this workflow is the only thing
# that needs it.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: "Release mode"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - enter-beta
          - exit-beta
          - publish-only

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  ceremony:
    name: Ceremony (enter-beta / exit-beta)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && (inputs.mode == 'enter-beta' || inputs.mode == 'exit-beta')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Enter beta (idempotent)
        if: inputs.mode == 'enter-beta'
        run: |
          if [ -f .changeset/pre.json ]; then
            echo "Already in pre-release state — nothing to do."
            exit 0
          fi
          pnpm exec changeset pre enter beta
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .changeset/pre.json
          git commit -m "chore(release): enter beta pre-release state"
          git push origin main

      - name: Exit beta (idempotent)
        if: inputs.mode == 'exit-beta'
        run: |
          if [ ! -f .changeset/pre.json ]; then
            echo "Not in pre-release state — nothing to do."
            exit 0
          fi
          pnpm exec changeset pre exit
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .changeset/pre.json
          git commit -m "chore(release): exit beta pre-release state"
          git push origin main

  release:
    name: Compare + publish
    runs-on: ubuntu-latest
    needs: [ceremony]
    # Run after ceremony (if any) finishes OR skips. `always()` keeps
    # this job reachable when `ceremony` is skipped (push flow).
    if: always() && (needs.ceremony.result == 'success' || needs.ceremony.result == 'skipped')
    permissions:
      contents: write
      id-token: write
    steps:
      # Uses the default GITHUB_TOKEN for checkout; publishing itself
      # is gated by comparing package.json versions with npm below.
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 11.1.3
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # See `ci.yml` — the nested `packages/components` workspace
      # needs its own install before component leaves get built.
      - name: Install components workspace
        run: pnpm --dir packages/components install --frozen-lockfile --config.strictDepBuilds=false

      - name: Build all packages
        run: pnpm build

      - name: Report current release state
        run: |
          if [ -f .changeset/pre.json ]; then
            echo "Changesets pre-release mode: ACTIVE (dist-tag = beta)"
            cat .changeset/pre.json
          else
            echo "Changesets pre-release mode: INACTIVE (dist-tag = latest)"
          fi
          echo "Pending changesets:"
          ls -la .changeset/*.md 2>/dev/null | grep -v README.md || echo "  (none)"

      # Changesets sanity. Runs the repo's full check:all for the
      # publishable runtime cone before version/publish, so a broken
      # tree never hits npm.
      - name: Run release gates
        run: |
          pnpm --filter @anvilkit/core check:all
          for pkg in @anvilkit/ir @anvilkit/schema @anvilkit/validator \
                     @anvilkit/plugin-export-html @anvilkit/plugin-ai-copilot; do
            pnpm --filter "$pkg" check:all
          done

      # `setup-node` creates npm auth config for normal cases. Write
      # and export one explicit userconfig so both npm probes and
      # `changeset publish` read the same registry token.
      - name: Configure npm publish auth
        if: github.event_name == 'push' || inputs.mode == 'auto' || inputs.mode == 'publish-only'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::error::NPM_TOKEN secret is empty; cannot publish to npm."
            exit 1
          fi

          umask 077
          npmrc="${RUNNER_TEMP}/npm-publish.npmrc"
          {
            echo "registry=https://registry.npmjs.org/"
            echo "@anvilkit:registry=https://registry.npmjs.org/"
            echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}"
            echo "always-auth=true"
            echo "access=public"
          } > "${npmrc}"

          cp "${npmrc}" .npmrc
          echo "NPM_CONFIG_USERCONFIG=${npmrc}" >> "${GITHUB_ENV}"
          echo "Configured npm publish auth at ${npmrc} and workspace .npmrc"

      # Pre-publish guard: compare each public workspace package's
      # package.json version against npm. Missing package names fail
      # loudly; first publishes must be intentional and never created
      # by this workflow. Existing package names with absent versions
      # are passed to the publish step below.
      - name: Compare package.json versions with npm
        id: publish-plan
        if: github.event_name == 'push' || inputs.mode == 'auto' || inputs.mode == 'publish-only'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_USERCONFIG: ${{ runner.temp }}/npm-publish.npmrc
        run: node scripts/ensure-npm-packages-exist.mjs --dry-run --require-publish-auth

      # Publish only versions that already exist in package.json and
      # are absent from npm. Version changes must arrive through an
      # explicit manifest edit before this workflow runs.
      - name: Publish package.json versions
        if: steps.publish-plan.outputs.should_publish == 'true'
        run: pnpm exec changeset publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_ALWAYS_AUTH: "true"
          NPM_CONFIG_REGISTRY: "https://registry.npmjs.org/"
          NPM_CONFIG_USERCONFIG: ${{ runner.temp }}/npm-publish.npmrc
