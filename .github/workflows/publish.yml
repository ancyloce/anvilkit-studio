name: Publish

# phase4-017 + phase5-019 — auto-publish on merge to main when
# changesets exist, with explicit ceremony hooks for the
# beta → 1.0 → GA transitions.
#
# Normal flow (push to main): the Changesets release action either
#   1. opens a "Version packages" PR that bumps versions and consumes
#      pending changesets, OR
#   2. when that PR merges, publishes the bumped versions to npm
#      under the current dist-tag (`beta` during pre-release,
#      `latest` after exit).
#
# Ceremony flow (workflow_dispatch): the maintainer picks a `mode`:
#   - `auto`          — default, same as the push-triggered flow.
#   - `enter-beta`    — one-shot: `pnpm changeset pre enter beta`
#                        + commit + push. Flips the repo into
#                        pre-release state before the first beta cut.
#                        No-op if already in pre state.
#   - `exit-beta`     — one-shot: `pnpm changeset pre exit` + commit
#                        + push. Flips back to `latest` dist-tag for
#                        the `v1.0.0` GA cut. No-op if not in pre.
#   - `publish-only`  — skips the auto-ceremony detection and just
#                        runs the changesets publish step. Useful
#                        when a prior `enter-beta`/`exit-beta` job
#                        already landed its commit.
#
# NPM_TOKEN must be a granular, automation-scoped token scoped to
# the @anvilkit/* packages. Publish steps expose it as both NPM_TOKEN
# (for changesets/action) and NODE_AUTH_TOKEN (for setup-node's npmrc).
# The release job also writes an explicit temp npmrc so every nested
# npm/pnpm process uses the same token-backed registry configuration.
# Rotate on any suspected compromise — this workflow is the only thing
# that needs it.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: "Release mode"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - enter-beta
          - exit-beta
          - publish-only

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  ceremony:
    name: Ceremony (enter-beta / exit-beta)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && (inputs.mode == 'enter-beta' || inputs.mode == 'exit-beta')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Enter beta (idempotent)
        if: inputs.mode == 'enter-beta'
        run: |
          if [ -f .changeset/pre.json ]; then
            echo "Already in pre-release state — nothing to do."
            exit 0
          fi
          pnpm exec changeset pre enter beta
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .changeset/pre.json
          git commit -m "chore(release): enter beta pre-release state"
          git push origin main

      - name: Exit beta (idempotent)
        if: inputs.mode == 'exit-beta'
        run: |
          if [ ! -f .changeset/pre.json ]; then
            echo "Not in pre-release state — nothing to do."
            exit 0
          fi
          pnpm exec changeset pre exit
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .changeset/pre.json
          git commit -m "chore(release): exit beta pre-release state"
          git push origin main

  release:
    name: Version + publish
    runs-on: ubuntu-latest
    needs: [ceremony]
    # Run after ceremony (if any) finishes OR skips. `always()` keeps
    # this job reachable when `ceremony` is skipped (push flow).
    if: always() && (needs.ceremony.result == 'success' || needs.ceremony.result == 'skipped')
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      # RELEASE_PAT (a fine-grained PAT or GitHub App token) is used
      # instead of the default GITHUB_TOKEN so changesets/action can
      # open the "Version packages" PR. The default token is blocked
      # from creating PRs unless the repo-wide "Allow GitHub Actions
      # to create and approve pull requests" setting is enabled; using
      # a PAT here keeps that restrictive default. The PAT also drives
      # the branch push and recursive submodule checkout below, and —
      # unlike GITHUB_TOKEN — its pushes trigger CI on the version PR.
      # Required scopes: Contents: read/write, Pull requests:
      # read/write on this repo and every submodule repo.
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # See `ci.yml` — the nested `packages/components` workspace
      # needs its own install before component leaves get built.
      - name: Install components workspace
        run: pnpm --dir packages/components install --frozen-lockfile --config.strictDepBuilds=false

      - name: Build all packages
        run: pnpm build

      - name: Report current release state
        run: |
          if [ -f .changeset/pre.json ]; then
            echo "Changesets pre-release mode: ACTIVE (dist-tag = beta)"
            cat .changeset/pre.json
          else
            echo "Changesets pre-release mode: INACTIVE (dist-tag = latest)"
          fi
          echo "Pending changesets:"
          ls -la .changeset/*.md 2>/dev/null | grep -v README.md || echo "  (none)"

      # Changesets sanity. Runs the repo's full check:all for the
      # publishable runtime cone before version/publish, so a broken
      # tree never hits npm.
      - name: Run release gates
        run: |
          pnpm --filter @anvilkit/core check:all
          for pkg in @anvilkit/ir @anvilkit/schema @anvilkit/validator \
                     @anvilkit/plugin-export-html @anvilkit/plugin-ai-copilot; do
            pnpm --filter "$pkg" check:all
          done

      # `setup-node` creates npm auth config for normal cases, but the
      # publish chain here is nested (`changesets/action` -> pnpm ->
      # changeset -> npm publish). Write and export one explicit
      # userconfig so every child process reads the same registry token.
      - name: Configure npm publish auth
        if: github.event_name == 'push' || inputs.mode == 'auto' || inputs.mode == 'publish-only'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::error::NPM_TOKEN secret is empty; cannot publish to npm."
            exit 1
          fi

          umask 077
          npmrc="${RUNNER_TEMP}/npm-publish.npmrc"
          {
            echo "registry=https://registry.npmjs.org/"
            echo "@anvilkit:registry=https://registry.npmjs.org/"
            echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}"
            echo "access=public"
          } > "${npmrc}"

          echo "NPM_CONFIG_USERCONFIG=${npmrc}" >> "${GITHUB_ENV}"
          echo "Configured npm publish auth at ${npmrc}"

      # Pre-publish guard: for any publishable workspace package that
      # has never been published to npm (new package name, rename,
      # freshly added plugin), create the registry entry by running a
      # first-time `pnpm publish` from the local build. Without this
      # step, downstream tooling that probes the registry with
      # `npm view` would hit `E404 undefined` until the package
      # eventually lands on npm. The script is idempotent: when every
      # package already exists, it is a no-op.
      #
      # Dist-tag is resolved from `.changeset/pre.json` (beta during
      # pre-release ceremony, latest otherwise) so first publishes
      # land on the same tag Changesets is about to use.
      - name: Auto-create missing npm packages
        if: github.event_name == 'push' || inputs.mode == 'auto' || inputs.mode == 'publish-only'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_USERCONFIG: ${{ runner.temp }}/npm-publish.npmrc
        run: node scripts/ensure-npm-packages-exist.mjs

      # `publish: pnpm release` runs the repo's own release script
      # (versions consumed, tags cut, then `changeset publish`).
      # Without changesets, the action opens the "Version packages"
      # PR instead of publishing — zero-op otherwise.
      - name: Create Release PR or Publish
        id: changesets
        if: github.event_name == 'push' || inputs.mode == 'auto' || inputs.mode == 'publish-only'
        uses: changesets/action@v1
        with:
          publish: pnpm exec changeset publish
          version: pnpm exec changeset version
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          # PAT (not GITHUB_TOKEN) so the action can create the
          # release PR with the repo-wide Actions-create-PR setting
          # left disabled. See the checkout step note above.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_USERCONFIG: ${{ runner.temp }}/npm-publish.npmrc
