name: Generator smoke

# phase4-013 — weekly smoke test for the published
# `@anvilkit/create-plugin` generator.
#
# Runs `pnpm dlx @anvilkit/create-plugin@latest` against a tmp
# directory with representative flags, then installs, builds, and
# tests the generated output. Fails and pings the maintainer on
# regression.
#
# Intentionally OUT of PR gating: this exercises the published
# tarball, not the current branch. Per-PR safety for the scaffolder
# is covered by `pnpm -F @anvilkit/create-plugin test` in `ci.yml`.

on:
  schedule:
    # Mondays 06:47 UTC — off-peak, weekly.
    - cron: "47 6 * * 1"
  workflow_dispatch:

jobs:
  smoke:
    name: Scaffold, install, build, test the published generator
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    timeout-minutes: 15
    steps:
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Pre-flight: confirm `@latest` resolves on npm. First publishes
      # are intentional, maintainer-owned steps — `publish.yml` never
      # auto-creates missing package names — so an E404 here means the
      # first version simply has not been published yet. Soft-skip the
      # smoke in that case (the maintainer doesn't need a weekly false
      # alarm); fail loud only on unexpected probe errors.
      - name: Verify @anvilkit/create-plugin@latest exists on npm
        id: check-dist-tag
        run: |
          set +e
          PROBE_STDERR="$(npm view @anvilkit/create-plugin@latest version 2>&1 >/dev/null)"
          PROBE_STATUS=$?
          set -e
          if [ $PROBE_STATUS -eq 0 ]; then
            VERSION="$(npm view @anvilkit/create-plugin@latest version 2>/dev/null)"
            echo "Resolved @anvilkit/create-plugin@latest => $VERSION"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "should-run=true" >> "$GITHUB_OUTPUT"
          elif echo "$PROBE_STDERR" | grep -qE "E404|404 Not Found"; then
            echo "::notice::@anvilkit/create-plugin not yet on npm — first publish has not landed. Skipping smoke."
            echo "should-run=false" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Unexpected npm probe failure (status $PROBE_STATUS):"
            echo "$PROBE_STDERR"
            exit 1
          fi

      - name: Scaffold a plugin from the latest published generator
        id: scaffold
        if: steps.check-dist-tag.outputs.should-run == 'true'
        run: |
          WORKDIR="$(mktemp -d)"
          echo "workdir=$WORKDIR" >> "$GITHUB_OUTPUT"
          cd "$WORKDIR"
          echo "Using @anvilkit/create-plugin@${{ steps.check-dist-tag.outputs.version }}"
          pnpm dlx @anvilkit/create-plugin@latest \
            --name hello-plugin \
            --display "Hello Plugin" \
            --category rail-panel \
            --dir "$WORKDIR"

      - name: Install generated package
        if: steps.check-dist-tag.outputs.should-run == 'true'
        working-directory: ${{ steps.scaffold.outputs.workdir }}/hello-plugin
        run: pnpm install --ignore-workspace --no-frozen-lockfile

      - name: Build generated package
        if: steps.check-dist-tag.outputs.should-run == 'true'
        working-directory: ${{ steps.scaffold.outputs.workdir }}/hello-plugin
        run: pnpm build

      - name: Test generated package
        if: steps.check-dist-tag.outputs.should-run == 'true'
        working-directory: ${{ steps.scaffold.outputs.workdir }}/hello-plugin
        run: pnpm test

      - name: Publint generated package
        if: steps.check-dist-tag.outputs.should-run == 'true'
        working-directory: ${{ steps.scaffold.outputs.workdir }}/hello-plugin
        run: pnpm publint

      # Open / reuse an issue if anything above failed. Avoids
      # silent cron failures — maintainer gets a PR-like ping.
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "generator-smoke: scaffold regression";
            const body = `Generator smoke failed on ${new Date().toISOString()}. ` +
              `See run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "generator-smoke",
            });
            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["generator-smoke", "bug"],
              });
            }
