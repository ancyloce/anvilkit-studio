name: Docker Images (GHCR)

# Build the apps/studio (Next.js), apps/docs (Vite/TanStack Start) and
# apps/collab (Hocuspocus relay) images and push them to GitHub Container
# Registry so other servers can pull them:
#   docker pull ghcr.io/<owner>/studio:latest
#   docker pull ghcr.io/<owner>/docs:latest
#   docker pull ghcr.io/<owner>/collab:latest
# Images are NOT published to Docker Hub.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      save_tar:
        description: "Also save each image as a downloadable .tar.gz artifact (offline distribution)"
        type: boolean
        default: false

# One push to main supersedes an in-flight build for the same ref.
concurrency:
  group: docker-images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # Full, plain-text BuildKit logs in the Actions console (preserved with the run).
  BUILDKIT_PROGRESS: plain

jobs:
  build-and-push:
    name: Build & push ${{ matrix.app }}
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout (+ submodules)
      packages: write # push to ghcr.io
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: studio
            image: studio
            dockerfile: apps/studio/Dockerfile
          - app: docs
            image: docs
            dockerfile: apps/docs/Dockerfile
    steps:
      # 1. Checkout — submodules:recursive is REQUIRED; the workspace packages
      #    the apps depend on live in git submodules.
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      # Resolve a fully lowercased image ref (GHCR rejects uppercase paths).
      - name: Compute image reference
        id: img
        env:
          REGISTRY: ${{ env.REGISTRY }}
          OWNER: ${{ github.repository_owner }}
          IMAGE: ${{ matrix.image }}
        run: |
          ref="${REGISTRY,,}/${OWNER,,}/${IMAGE,,}"
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"
          echo "Image: ${ref}"

      # 2. Buildx (BuildKit) for cache + efficient multi-stage builds.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Log in to GHCR with the workflow token (no extra secret needed).
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive tags + OCI labels: `latest` on the default branch plus an
      # immutable short-SHA tag for traceability/rollback. Generate these
      # locally so a transient GitHub repository API response cannot block the
      # image build before it starts.
      - name: Generate Docker metadata
        id: meta
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          IMAGE_REF: ${{ steps.img.outputs.ref }}
          SOURCE: ${{ github.server_url }}/${{ github.repository }}
          TITLE: anvilkit-${{ matrix.app }}
        run: |
          short_sha="${GITHUB_SHA:0:7}"
          version="sha-${short_sha}"
          created="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          if [[ "${GITHUB_REF}" == "refs/heads/${DEFAULT_BRANCH}" ]]; then
            version="latest"
          fi

          {
            echo "tags<<EOF"
            if [[ "${GITHUB_REF}" == "refs/heads/${DEFAULT_BRANCH}" ]]; then
              echo "${IMAGE_REF}:latest"
            fi
            echo "${IMAGE_REF}:sha-${short_sha}"
            echo "EOF"

            echo "labels<<EOF"
            echo "org.opencontainers.image.title=${TITLE}"
            echo "org.opencontainers.image.url=${SOURCE}"
            echo "org.opencontainers.image.source=${SOURCE}"
            echo "org.opencontainers.image.version=${version}"
            echo "org.opencontainers.image.created=${created}"
            echo "org.opencontainers.image.revision=${GITHUB_SHA}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # 4. Build and push. build-push-action v6 also emits a build summary
      #    (logs/record) attached to the run, so build output is preserved.
      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: . # repo root — the monorepo build context
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false # keep the GHCR package listing clean (no unknown/unknown)
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

      # Optional offline-distribution path (workflow_dispatch only): re-resolve
      # the just-built image from the buildx cache with --load, then
      # `docker save | gzip` to a tarball and upload it as a run artifact.
      # A server with no GHCR access can `docker load < <app>-image.tar.gz`.
      - name: Save image to tarball
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.save_tar }}
        run: |
          docker buildx build \
            --load \
            --file "${{ matrix.dockerfile }}" \
            --tag "${{ steps.img.outputs.ref }}:latest" \
            --cache-from type=gha,scope=${{ matrix.app }} \
            .
          docker save "${{ steps.img.outputs.ref }}:latest" | gzip > "${{ matrix.app }}-image.tar.gz"
          ls -lh "${{ matrix.app }}-image.tar.gz"

      - name: Upload image tarball
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.save_tar }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.app }}-image
          path: ${{ matrix.app }}-image.tar.gz
          retention-days: 7

      # Preserve tangible diagnostics when a build fails (the full BuildKit
      # log is already inline in the run via BUILDKIT_PROGRESS=plain).
      - name: Collect build diagnostics on failure
        if: failure()
        run: |
          mkdir -p build-diagnostics
          docker buildx ls    > build-diagnostics/buildx-ls.txt   2>&1 || true
          docker info         > build-diagnostics/docker-info.txt 2>&1 || true
          df -h               > build-diagnostics/disk.txt        2>&1 || true

      - name: Upload build diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: docker-build-diagnostics-${{ matrix.app }}
          path: build-diagnostics/
          retention-days: 7
          if-no-files-found: ignore

  # apps/collab is the standalone Hocuspocus relay. It is NOT a pnpm workspace
  # member and pulls in no submodule packages, and its Dockerfile COPYs files
  # (package.json / package-lock.json / server.mjs) from the *context root* —
  # so it needs a plain checkout and a build context of apps/collab (NOT the
  # monorepo root). That makes it a separate job rather than a matrix entry of
  # build-and-push above.
  build-and-push-collab:
    name: Build & push collab
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout
      packages: write # push to ghcr.io
    steps:
      # 1. Checkout — no submodules: apps/collab is self-contained and tracked
      #    directly in the superproject.
      - name: Check out repository
        uses: actions/checkout@v6

      # Resolve a fully lowercased image ref (GHCR rejects uppercase paths).
      - name: Compute image reference
        id: img
        env:
          REGISTRY: ${{ env.REGISTRY }}
          OWNER: ${{ github.repository_owner }}
          IMAGE: collab
        run: |
          ref="${REGISTRY,,}/${OWNER,,}/${IMAGE,,}"
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"
          echo "Image: ${ref}"

      # 2. Buildx (BuildKit) for cache + efficient layer builds.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Log in to GHCR with the workflow token (no extra secret needed).
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive tags + OCI labels: `latest` on the default branch plus an
      # immutable short-SHA tag for traceability/rollback. Generate these
      # locally so a transient GitHub repository API response cannot block the
      # image build before it starts.
      - name: Generate Docker metadata
        id: meta
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          IMAGE_REF: ${{ steps.img.outputs.ref }}
          SOURCE: ${{ github.server_url }}/${{ github.repository }}
          TITLE: anvilkit-collab
        run: |
          short_sha="${GITHUB_SHA:0:7}"
          version="sha-${short_sha}"
          created="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          if [[ "${GITHUB_REF}" == "refs/heads/${DEFAULT_BRANCH}" ]]; then
            version="latest"
          fi

          {
            echo "tags<<EOF"
            if [[ "${GITHUB_REF}" == "refs/heads/${DEFAULT_BRANCH}" ]]; then
              echo "${IMAGE_REF}:latest"
            fi
            echo "${IMAGE_REF}:sha-${short_sha}"
            echo "EOF"

            echo "labels<<EOF"
            echo "org.opencontainers.image.title=${TITLE}"
            echo "org.opencontainers.image.url=${SOURCE}"
            echo "org.opencontainers.image.source=${SOURCE}"
            echo "org.opencontainers.image.version=${version}"
            echo "org.opencontainers.image.created=${created}"
            echo "org.opencontainers.image.revision=${GITHUB_SHA}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # 4. Build and push. Context is apps/collab (the collab Dockerfile COPYs
      #    from the context root), NOT the monorepo root.
      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: apps/collab # the standalone collab service dir
          file: apps/collab/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false # keep the GHCR package listing clean (no unknown/unknown)
          cache-from: type=gha,scope=collab
          cache-to: type=gha,mode=max,scope=collab

      # Optional offline-distribution path (workflow_dispatch only): re-resolve
      # the just-built image from the buildx cache with --load, then
      # `docker save | gzip` to a tarball and upload it as a run artifact.
      # A server with no GHCR access can `docker load < collab-image.tar.gz`.
      - name: Save image to tarball
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.save_tar }}
        run: |
          docker buildx build \
            --load \
            --file "apps/collab/Dockerfile" \
            --tag "${{ steps.img.outputs.ref }}:latest" \
            --cache-from type=gha,scope=collab \
            apps/collab
          docker save "${{ steps.img.outputs.ref }}:latest" | gzip > "collab-image.tar.gz"
          ls -lh "collab-image.tar.gz"

      - name: Upload image tarball
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.save_tar }}
        uses: actions/upload-artifact@v7
        with:
          name: collab-image
          path: collab-image.tar.gz
          retention-days: 7

      # Preserve tangible diagnostics when a build fails (the full BuildKit
      # log is already inline in the run via BUILDKIT_PROGRESS=plain).
      - name: Collect build diagnostics on failure
        if: failure()
        run: |
          mkdir -p build-diagnostics
          docker buildx ls    > build-diagnostics/buildx-ls.txt   2>&1 || true
          docker info         > build-diagnostics/docker-info.txt 2>&1 || true
          df -h               > build-diagnostics/disk.txt        2>&1 || true

      - name: Upload build diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: docker-build-diagnostics-collab
          path: build-diagnostics/
          retention-days: 7
          if-no-files-found: ignore
