name: Marketplace scorecard

# phase6-014 — gates the marketplace registry feed.
#
# On every PR that mutates `apps/docs/src/registry/feed.json` (or the
# first-party packages it indexes), enumerates the entries in the
# updated feed and runs the scorecard runner against each one. The
# runner emits a JSON payload per entry that is uploaded as a build
# artifact and (on a passing run) consumed by the docs build to
# render the verified-badge tooltip.
#
# Failure semantics:
#   - First-party entry fails any check  → workflow fails, blocking merge.
#   - Verified third-party entry fails   → workflow fails, blocking merge.
#   - Community entry (verified=false)   → workflow surfaces the failure
#                                          but does not block; the entry
#                                          stays in the feed with
#                                          `verified=false`.
#
# Also runs weekly on cron so previously-passing entries get
# re-verified against upstream churn (Node, tsc, deps).

on:
  pull_request:
    paths:
      - "apps/docs/src/registry/feed.json"
      - "apps/docs/src/registry/scorecards/**"
      - "apps/docs/scripts/scorecard-runner.ts"
      - "packages/templates/**"
      - "packages/plugins/**"
      - "packages/components/src/**"
  schedule:
    # Wednesdays 07:37 UTC — staggered off templates-smoke (Tue 07:17)
    # and generator-smoke.
    - cron: "37 7 * * 3"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  enumerate:
    name: Enumerate feed entries
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      count: ${{ steps.matrix.outputs.count }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - id: matrix
        name: Read feed.json and emit job matrix
        run: |
          MATRIX=$(node -e "
            const fs = require('node:fs');
            const feed = JSON.parse(fs.readFileSync('apps/docs/src/registry/feed.json', 'utf8'));
            const items = feed.entries.map(e => ({
              slug: e.slug,
              kind: e.kind,
              packageName: e.packageName,
              publisher: e.publisher,
            }));
            console.log(JSON.stringify({ include: items }));
          ")
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "count=$(echo "$MATRIX" | node -e "const j=JSON.parse(require('node:fs').readFileSync(0,'utf8')); console.log(j.include.length);")" >> "$GITHUB_OUTPUT"

  score:
    name: Score ${{ matrix.kind }}/${{ matrix.slug }}
    needs: enumerate
    if: needs.enumerate.outputs.count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.enumerate.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Build dependencies for first-party entries
        if: matrix.publisher == 'first-party'
        run: |
          # First-party entries import workspace-only deps; build the
          # transitive set so `pnpm --filter <pkg> build` resolves.
          pnpm --filter "${{ matrix.packageName }}..." build

      - name: Run scorecard for ${{ matrix.kind }}/${{ matrix.slug }}
        id: score
        run: |
          mkdir -p apps/docs/src/registry/scorecards
          pnpm --filter @anvilkit/docs-site exec jiti scripts/scorecard-runner.ts \
            --slug "${{ matrix.slug }}" \
            --kind "${{ matrix.kind }}" \
            --commit "${{ github.sha }}" \
            --output-dir "$(pwd)/apps/docs/src/registry/scorecards"

      - name: Upload scorecard artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-${{ matrix.kind }}-${{ matrix.slug }}
          path: apps/docs/src/registry/scorecards/${{ matrix.kind }}-${{ matrix.slug }}.json
          if-no-files-found: warn
          retention-days: 30

      - name: Fail-on-failure for first-party / verified entries
        if: failure() && (matrix.publisher == 'first-party' || matrix.publisher == 'verified')
        run: |
          echo "::error::Scorecard failed for ${{ matrix.kind }}/${{ matrix.slug }} (publisher=${{ matrix.publisher }}). Blocking merge."
          exit 1

  notify:
    name: Notify on schedule failure
    needs: score
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = `marketplace-scorecard: weekly re-verification failure`;
            const body = `marketplace-scorecard cron failed on ${new Date().toISOString()}. ` +
              `See run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "marketplace:re-verify",
            });
            const sameTitle = existing.find((i) => i.title === title);
            if (sameTitle) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: sameTitle.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["marketplace:re-verify", "bug"],
              });
            }
