name: Setup pnpm workspace
description: >-
  Set up pnpm + Node.js, install the root workspace, and install the nested
  packages/extensions/components workspace. Assumes the repository is already
  checked out with submodules — a local composite action can only run after
  checkout, so the checkout step stays in each job.

runs:
  using: composite
  steps:
    - name: Set up pnpm
      uses: pnpm/action-setup@v6
      with:
        version: 11.10.0
        run_install: false

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 22
        cache: pnpm
        cache-dependency-path: pnpm-lock.yaml

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    # `packages/extensions/components` is a nested pnpm workspace (its own
    # pnpm-workspace.yaml), so the root install doesn't populate its
    # `node_modules`. Without this step, turbo's `pnpm run build` inside a
    # component leaf triggers pnpm 11's verify-deps-before-run auto-install,
    # which is both slow and subject to strict-dep-builds errors on first
    # run.
    #
    # `--config.strictDepBuilds=false` overrides the pnpm 11 default that
    # turns ignored install scripts (esbuild, msw) into an
    # `[ERR_PNPM_IGNORED_BUILDS]` failure. The components workspace has no
    # build approvals of its own, so the install would otherwise abort even
    # though the ignored scripts are safe to skip.
    - name: Install components workspace
      shell: bash
      run: pnpm --dir packages/extensions/components install --frozen-lockfile --config.strictDepBuilds=false
