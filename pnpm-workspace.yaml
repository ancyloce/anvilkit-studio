packages:
  - "apps/*"
  - "packages/*"
  - "packages/plugins/*"
  - "packages/configs/*"
  - "packages/components/src/*"
  - "packages/templates/*"
  - "examples/plugins/*"
  - "examples/ai-adapters/*"
allowBuilds:
  esbuild: false
  leveldown: false
  msw: false
  sharp: false
overrides:
  react: 19.2.6
  react-dom: 19.2.6
  # Pin a single typedoc + typescript pair so typedoc-plugin-markdown's
  # `instanceof Reflection` check works — otherwise pnpm installs a
  # separate `typedoc` copy per consuming `typescript` peer version and
  # the plugin sees two different `Reflection` class instances at
  # render time and bails with "The page model should be a reflection
  # when rendering the 'reflection' page kind."
  typedoc: 0.28.19
  typescript: 6.0.3
