packages:
  - "apps/*"
  - "packages/*"
  - "packages/canvas/*"
  - "packages/plugins/*"
  - "packages/configs/*"
  - "packages/components/src/*"
  - "packages/templates/*"
  - "examples/plugins/*"
  - "examples/ai-adapters/*"
allowBuilds:
  # Pulled in by @tailwindcss/cli (CSS build). Native binding is supplied
  # by the prebuilt `@parcel/watcher-*` platform packages, so the node-gyp
  # install script isn't needed at runtime — skip it like the others below.
  '@parcel/watcher': false
  esbuild: false
  leveldown: false
  msw: false
  sharp: false
minimumReleaseAgeExclude:
  - '@vitest/expect@4.1.7'
  - '@vitest/mocker@4.1.7'
  - '@vitest/pretty-format@4.1.7'
  - '@vitest/runner@4.1.7'
  - '@vitest/snapshot@4.1.7'
  - '@vitest/spy@4.1.7'
  - '@vitest/utils@4.1.7'
  - vitest@4.1.7
  - '@turbo/darwin-64@2.9.15'
  - '@turbo/darwin-arm64@2.9.15'
  - '@turbo/linux-64@2.9.15'
  - '@turbo/linux-arm64@2.9.15'
  - '@turbo/windows-64@2.9.15'
  - '@turbo/windows-arm64@2.9.15'
  - turbo@2.9.15
patchedDependencies:
  "@base-ui/react@1.5.0": packages/components/patches/@base-ui__react@1.5.0.patch

overrides:
  react: 19.2.6
  react-dom: 19.2.6
  # Pin a single typedoc + typescript pair so typedoc-plugin-markdown's
  # `instanceof Reflection` check works — otherwise pnpm installs a
  # separate `typedoc` copy per consuming `typescript` peer version and
  # the plugin sees two different `Reflection` class instances at
  # render time and bails with "The page model should be a reflection
  # when rendering the 'reflection' page kind."
  typedoc: 0.28.19
  typescript: 6.0.3
